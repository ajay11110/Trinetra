<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            padding: 0;
            margin: 0;
            color: white;
        }

        .bg {
            background-color: rgb(255, 255, 255,0);
            width: 100vw;
            height: 100vh;

        }

        .header {
            background-color: rgb(0, 0, 0);
            width: 100%;
            height: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-size: 30px;
            font-weight: bolder;
            color: rgb(0, 255, 17);
            padding-left: 20px;
        }

        .button {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .hbutton {
            font-size: 20px;
            padding: 5px;
            font-weight: 700;
            border: none;
            outline: none;
            border-radius: 5px;
        }

        .scan {
            background-color: rgb(0, 225, 255);
        }

        .scan.stop {
            background-color: red;
            color: white;
        }
        .face {
            background-color: red;
        }

        .voice {
            font-weight: 600;
            font-size: 18px;
        }

        .screen {
            display: flex;
            justify-content: center;
        }

        .center {
            border: 1px solid rgb(0, 255, 4);
            border-radius: 10px;
            box-shadow: 0px 0px 10px 2px rgb(29, 255, 4);
            width: 400px;
            height: calc(100vh - 60px);
            margin: 3px;
        }
    </style>
</head>

<body>
    <div class="start">
        <div class="bg">
            <div class="header">
                <div class="brand">Trinetra</div>
                <div class="button">
                    <button class="hbutton scan">Start Scan</button>
                    <button class="hbutton face">Remember Face</button>
                    <span class="voice">Voice Guidance</span>
                    <input type="checkbox" name="voice" id="voice">
                </div>
            </div>
            <div class="screen">
                <div class="center"></div>
            </div>
        </div>
    </div>

    <script>
        let scan = document.getElementsByClassName("scan")[0]
        scan.addEventListener("click", () => {
            if (scan.innerText.trim() === "Start Scan") {
                scan.innerText = "Stop Scan"
                scan.classList.add("stop")
            } else {
                scan.innerText = "Start Scan"
                scan.classList.remove("stop")
            }
        })
    </script>
</body>

</html>
